<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sodda Sidebar Darsi</title>
    
    <style>
        /* 1. UMUMIY STILLAR */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        /* 2. SIDEBAR STILI */
        .sidebar {
            height: 100%;
            width: 260px;
            position: fixed; /* Ekranga yopishib turishi uchun */
            top: 0;
            left: 0;
            background-color: #2c3e50;
            padding-top: 60px;
            transition: 0.4s; /* Harakat silliq bo'lishi uchun */
            
            /* Sidebarni chap tomonga butunlay yashirish */
            transform: translateX(-100%);
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }

        /* Sidebar ichidagi linklar */
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        /* 3. SIDEBARNI OCHISH KLASSI */
        /* JS orqali shu klassni qo'shganimizda sidebar ko'rinadi */
        .sidebar.active {
            transform: translateX(0);
        }

        /* 4. TUGMALAR STILI */
        #openBtn {
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            background: none;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="openBtn">☰ Menyuni ochish</button>

    <div id="mySidebar" class="sidebar">
        <button id="closeBtn" class="close-btn">&times;</button>
        
        <a href="#">Bosh sahifa</a>
        <a href="#">Biz haqimizda</a>
        <a href="#">Xizmatlar</a>
        <a href="#">Aloqa</a>
    </div>

    <script>
        // 1. Kerakli elementlarni HTMLdan qidirib topamiz
        const sidebar = document.getElementById("mySidebar");
        const openBtn = document.getElementById("openBtn");
        const closeBtn = document.getElementById("closeBtn");

        // 2. Ochish tugmasi bosilganda:
        openBtn.addEventListener("click", function() {
            // Sidebarga "active" klassini qo'shamiz
            sidebar.classList.add("active");
        });

        // 3. Yopish tugmasi bosilganda:
        closeBtn.addEventListener("click", function() {
            // Sidebardan "active" klassini olib tashlaymiz
            sidebar.classList.remove("active");
        });

        // Qo'shimcha: Sidebar tashqarisini bossa ham yopiladigan qilish (ixtiyoriy)
        window.addEventListener("click", function(event) {
            if (event.target == sidebar) {
                sidebar.classList.remove("active");
            }
        });
    </script>

</body>
</html>
