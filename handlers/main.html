<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sodda To-Do App</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: #007bff; }
        button#add-btn { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        ul { list-style: none; padding: 0; }
        li { 
            background: #fff; border-bottom: 1px solid #eee; padding: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .task-text { flex: 1; cursor: pointer; }
        .completed { text-decoration: line-through; color: gray; }
        .actions button { margin-left: 5px; padding: 5px 8px; border: none; border-radius: 4px; cursor: pointer; }
        .edit-btn { background: #ffc107; color: white; }
        .delete-btn { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mening Vazifalarim</h2>
    <div class="input-group">
        <input type="text" id="task-input" placeholder="Yangi vazifa...">
        <button id="add-btn">Qo'shish</button>
    </div>
    <ul id="task-list"></ul>
</div>

<script>
    const input = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('task-list');

    // 1. CREATE (Yaratish)
    addBtn.onclick = () => {
        const text = input.value.trim();
        if (text === "") return alert("Matn kiriting!");
        
        createTaskElement(text);
        input.value = ""; // Inputni tozalash
    };

    function createTaskElement(text) {
        const li = document.createElement('li');
        
        li.innerHTML = `
            <span class="task-text">${text}</span>
            <div class="actions">
                <button class="edit-btn">✏️</button>
                <button class="delete-btn">🗑️</button>
            </div>
        `;

        // 2. UPDATE (Bajarilgan deb belgilash)
        const taskSpan = li.querySelector('.task-text');
        taskSpan.onclick = () => taskSpan.classList.toggle('completed');

        // 3. UPDATE (Tahrirlash)
        li.querySelector('.edit-btn').onclick = () => {
            const currentText = taskSpan.textContent;
            const newText = prompt("Vazifani tahrirlang:", currentText);
            if (newText && newText.trim() !== "") {
                taskSpan.textContent = newText;
            }
        };

        // 4. DELETE (O'chirish)
        li.querySelector('.delete-btn').onclick = () => {
            if(confirm("Rostdan ham o'chirmoqchimisiz?")) li.remove();
        };

        list.appendChild(li);
    }

    // Enter tugmasini bosganda ham qo'shish
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addBtn.click();
    });
</script>

</body>
</html>
