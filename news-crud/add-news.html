<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Yangilik qo'shish</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    #xabar {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: green;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Yangilik qo'shish</h2>

    <input type="text" id="title" placeholder="Sarlavha" />
    <textarea id="description" rows="4" placeholder="Matn"></textarea>
    <input type="text" id="author" placeholder="Muallif" />

    <button onclick="qoshish()">Qo'shish</button>
    <p id="xabar"></p>
  </div>

  <script>
    function qoshish() {
      const title       = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const author      = document.getElementById('author').value;

      fetch('http://144.91.118.72:8080/api/v1/news/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, author })
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById('xabar').textContent = 'Yangilik qo\'shildi! ID: ' + data.id;
          document.getElementById('title').value       = '';
          document.getElementById('description').value = '';
          document.getElementById('author').value      = '';
        });
    }
  </script>

</body>
</html>
