<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Yangiliklar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 { text-align: center; margin-bottom: 24px; }

    /* --- FORMA --- */
    .forma {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: 0 auto 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .forma h2 { margin-bottom: 14px; font-size: 18px; }

    .forma input,
    .forma textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .forma button {
      width: 100%;
      padding: 11px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    .forma button:hover { background: #357abd; }

    #xabar {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    /* --- GRID --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body { padding: 14px; }

    .card-body h3 { font-size: 16px; margin-bottom: 6px; }

    .card-body p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .card-body .meta {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .tugmalar { display: flex; gap: 8px; }

    .tugmalar button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-edit   { background: #f0ad4e; color: white; }
    .btn-delete { background: #e74c3c; color: white; }

    .btn-edit:hover   { background: #d9922a; }
    .btn-delete:hover { background: #c0392b; }
  </style>
</head>
<body>

  <h1>Yangiliklar</h1>

  <!-- FORMA -->
  <div class="forma">
    <h2 id="forma-sarlavha">Yangilik qo'shish</h2>
    <input type="hidden" id="tahrir-id" />
    <input type="text"   id="title"       placeholder="Sarlavha" />
    <textarea            id="description" placeholder="Matn" rows="3"></textarea>
    <input type="text"   id="author"      placeholder="Muallif" />
    <button onclick="saqlash()">Saqlash</button>
    <p id="xabar"></p>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <script>
    var API = 'http://144.91.118.72:8080/api/v1/news/';

    // ── Ro'yxatni yuklash (GET) ──────────────────────────────────────────
    function yuklash() {
      fetch(API)
        .then(function(res) { return res.json(); })
        .then(function(data) {
          var grid = document.getElementById('grid');
          grid.innerHTML = '';

          data.results.forEach(function(item) {
            var rasm = item.image || 'https://placehold.co/400x180?text=Rasm+yoq';

            var karta = document.createElement('div');
            karta.className = 'card';
            karta.innerHTML =
              '<img src="' + rasm + '" />' +
              '<div class="card-body">' +
                '<h3>' + item.title + '</h3>' +
                '<p class="meta">Muallif: ' + (item.author || '—') + ' | ' + item.created_at.slice(0, 10) + '</p>' +
                '<p>' + item.description + '</p>' +
                '<div class="tugmalar">' +
                  '<button class="btn-edit"   onclick="tahrirlash(' + item.id + ')">Tahrirlash</button>' +
                  '<button class="btn-delete" onclick="ochirish(' + item.id + ')">O\'chirish</button>' +
                '</div>' +
              '</div>';

            grid.appendChild(karta);
          });
        })
        .catch(function(xato) {
          document.getElementById('grid').innerHTML = '<p style="color:red">Xato: ' + xato.message + '</p>';
        });
    }

    // ── Saqlash: POST yoki PUT ───────────────────────────────────────────
    function saqlash() {
      var id    = document.getElementById('tahrir-id').value;
      var title = document.getElementById('title').value.trim();
      var desc  = document.getElementById('description').value.trim();
      var auth  = document.getElementById('author').value.trim();

      if (!title || !desc) {
        xabarKorsat('Sarlavha va matnni kiriting!', 'red');
        return;
      }

      var url    = id ? API + id + '/' : API;
      var method = id ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, description: desc, author: auth })
      })
        .then(function(res) { return res.json(); })
        .then(function() {
          xabarKorsat(id ? 'Yangilandi!' : 'Qo\'shildi!', 'green');
          formaTozala();
          yuklash();
        });
    }

    // ── Tahrirlash uchun formani to'ldirish (GET <id>) ───────────────────
    function tahrirlash(id) {
      fetch(API + id + '/')
        .then(function(res) { return res.json(); })
        .then(function(item) {
          document.getElementById('tahrir-id').value    = item.id;
          document.getElementById('title').value        = item.title;
          document.getElementById('description').value  = item.description;
          document.getElementById('author').value       = item.author || '';
          document.getElementById('forma-sarlavha').textContent = 'Tahrirlash (ID: ' + item.id + ')';
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // ── O'chirish (DELETE) ───────────────────────────────────────────────
    function ochirish(id) {
      if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;

      fetch(API + id + '/', { method: 'DELETE' })
        .then(function() {
          yuklash();
        });
    }

    // ── Yordamchi funksiyalar ────────────────────────────────────────────
    function formaTozala() {
      document.getElementById('tahrir-id').value   = '';
      document.getElementById('title').value        = '';
      document.getElementById('description').value  = '';
      document.getElementById('author').value       = '';
      document.getElementById('forma-sarlavha').textContent = 'Yangilik qo\'shish';
    }

    function xabarKorsat(matn, rang) {
      var el = document.getElementById('xabar');
      el.textContent = matn;
      el.style.color = rang;
      setTimeout(function() { el.textContent = ''; }, 3000);
    }

    // Sahifa ochilganda yuklash
    yuklash();
  </script>

</body>
</html>
