<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Yangiliklar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #ddd;
    }

    .card-body {
      padding: 14px;
    }

    .card-body h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .card-body p {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <h1>Yangiliklar</h1>
  <div class="grid" id="grid"></div>

  <script>
    fetch('http://144.91.118.72:8080/api/v1/news/')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('grid');

        data.results.forEach(item => {
          grid.innerHTML += `
            <div class="card">
              <img src="${item.image || 'https://placehold.co/400x180?text=Rasm+yoq'}" />
              <div class="card-body">
                <h3>${item.title}</h3>
                <p>${item.description}</p>
              </div>
            </div>
          `;
        });
      });
  </script>

</body>
</html>
