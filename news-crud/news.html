<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Yangiliklar</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 30px; }
    h1 { text-align: center; }

    .forma {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: 20px auto;
    }

    .forma input, .forma textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .forma button {
      width: 100%;
      padding: 10px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body { padding: 14px; }

    .card-body h3 { margin-bottom: 8px; }

    .card-body p { color: #666; margin-bottom: 10px; }

    .card-body button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      margin-right: 5px;
    }

    .edit   { background: orange; }
    .delete { background: red;    }
  </style>
</head>
<body>

  <h1>Yangiliklar</h1>

  <div class="forma">
    <input type="hidden" id="id" />
    <input type="text"   id="title"       placeholder="Sarlavha" />
    <textarea            id="description" placeholder="Matn"></textarea>
    <input type="text"   id="author"      placeholder="Muallif" />
    <button onclick="saqlash()">Saqlash</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    const API = 'http://144.91.118.72:8080/api/v1/news/';

    // GET — yangiliklarni olish
    async function yuklash() {
      const res  = await fetch(API);
      const data = await res.json();

      document.getElementById('grid').innerHTML = data.results.map(item => `
        <div class="card">
          <img src="${item.image || 'https://placehold.co/400x180?text=Rasm'}" />
          <div class="card-body">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
            <button class="edit"   onclick="tahrirlash(${item.id})">Tahrirlash</button>
            <button class="delete" onclick="ochirish(${item.id})">O'chirish</button>
          </div>
        </div>
      `).join('');
    }

    // POST yoki PUT — saqlash
    async function saqlash() {
      const id          = document.getElementById('id').value;
      const title       = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const author      = document.getElementById('author').value;

      await fetch(id ? API + id + '/' : API, {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, author })
      });

      document.getElementById('id').value          = '';
      document.getElementById('title').value       = '';
      document.getElementById('description').value = '';
      document.getElementById('author').value      = '';
      yuklash();
    }

    // Tahrirlash — formani to'ldirish
    async function tahrirlash(id) {
      const res  = await fetch(API + id + '/');
      const item = await res.json();

      document.getElementById('id').value          = item.id;
      document.getElementById('title').value       = item.title;
      document.getElementById('description').value = item.description;
      document.getElementById('author').value      = item.author;
    }

    // DELETE — o'chirish
    async function ochirish(id) {
      await fetch(API + id + '/', { method: 'DELETE' });
      yuklash();
    }

    yuklash();
  </script>

</body>
</html>
